[project]
name = "mcp-qucs-s"
version = "0.4.0"
description = "MCP server exposing Qucs-S (with Ngspice/Xyce backends) for native S-parameter sims, harmonic balance, microstrip / distributed-element synthesis, and lumped-to-distributed conversion"
readme = "README.md"
requires-python = ">=3.11"
license = "AGPL-3.0-or-later"
authors = [{ name = "Adam Engelbrecht", email = "adam.engelbrecht76@gmail.com" }]
keywords = ["mcp", "qucs", "qucs-s", "harmonic-balance", "microstrip", "rf-engineering"]

dependencies = [
    "rf-mcp-common",
    "fastmcp>=2.0.0",
    "scikit-rf>=1.2.0",
    "scipy>=1.11",
    "numpy>=1.26",
    "lxml>=5.0",
]

[project.scripts]
mcp-qucs-s = "mcp_qucs_s.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mcp_qucs_s"]
