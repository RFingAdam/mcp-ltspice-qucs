[project]
name = "mcp-rf-analysis"
version = "0.4.0"
description = "Simulator-agnostic MCP server for RF S-parameter analysis, regulatory band databases (LTE / 5G NR / GNSS / ISM / HaLow), and multi-radio coexistence engineering"
readme = "README.md"
requires-python = ">=3.11"
license = "AGPL-3.0-or-later"
authors = [{ name = "Adam Engelbrecht", email = "adam.engelbrecht76@gmail.com" }]
keywords = ["mcp", "rf-engineering", "scikit-rf", "lte", "5g", "coexistence", "regulatory"]

dependencies = [
    "rf-mcp-common",
    "fastmcp>=2.0.0",
    "scikit-rf>=1.2.0",
    "scipy>=1.11",
    "numpy>=1.26",
    "pandas>=2.1",
]

[project.scripts]
mcp-rf-analysis = "mcp_rf_analysis.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mcp_rf_analysis"]
