[project]
name = "rf-mcp-common"
version = "0.5.0"
description = "Shared contracts for the RF MCP suite: response envelope, Touchstone helpers, E-series snap, structured logging"
readme = "README.md"
requires-python = ">=3.11"
license = "AGPL-3.0-or-later"
authors = [{ name = "Adam Engelbrecht", email = "adam.engelbrecht76@gmail.com" }]
keywords = ["mcp", "rf-engineering", "touchstone", "scikit-rf"]

dependencies = [
    "pydantic>=2.7,<3",
    "scikit-rf>=1.2.0",
    "numpy>=1.26",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rf_mcp_common"]
