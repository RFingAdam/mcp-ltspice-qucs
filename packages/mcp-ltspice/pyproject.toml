[project]
name = "mcp-ltspice"
version = "0.1.0"
description = "MCP server exposing LTspice (and ngspice fallback) for RF filter synthesis, S-parameter extraction, vendor model substitution, optimization, and Monte Carlo analysis"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [{ name = "Adam Engelbrecht", email = "adam.engelbrecht76@gmail.com" }]
keywords = ["mcp", "ltspice", "ngspice", "spice", "filter-design", "rf-engineering"]

dependencies = [
    "rf-mcp-common",
    "fastmcp>=2.0.0",
    "spicelib>=1.4.0",
    "scipy>=1.11",
    "numpy>=1.26",
    "matplotlib>=3.8",
    "joblib>=1.3",
]

[project.scripts]
mcp-ltspice = "mcp_ltspice.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mcp_ltspice"]
