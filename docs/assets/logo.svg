<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 240" width="480" height="240"
     role="img" aria-label="mcp-ltspice-qucs logo: an elliptic LPF S21 response curve with three transmission zeros">
  <title>mcp-ltspice-qucs</title>
  <desc>An elliptic low-pass filter response with three transmission zero notches, in a stylised RF / electronics palette.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111c33"/>
    </linearGradient>
    <linearGradient id="curve" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3aa1ff"/>
      <stop offset="40%" stop-color="#3aa1ff"/>
      <stop offset="55%" stop-color="#5fd7c8"/>
      <stop offset="100%" stop-color="#5fd7c8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background panel -->
  <rect x="0" y="0" width="480" height="240" rx="20" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#1d2a45" stroke-width="0.5" opacity="0.7">
    <line x1="40" y1="40" x2="40" y2="200"/>
    <line x1="120" y1="40" x2="120" y2="200"/>
    <line x1="200" y1="40" x2="200" y2="200"/>
    <line x1="280" y1="40" x2="280" y2="200"/>
    <line x1="360" y1="40" x2="360" y2="200"/>
    <line x1="440" y1="40" x2="440" y2="200"/>
    <line x1="40" y1="60" x2="440" y2="60"/>
    <line x1="40" y1="100" x2="440" y2="100"/>
    <line x1="40" y1="140" x2="440" y2="140"/>
    <line x1="40" y1="180" x2="440" y2="180"/>
  </g>

  <!-- Axes -->
  <line x1="40" y1="200" x2="440" y2="200" stroke="#3a4d6f" stroke-width="1.4"/>
  <line x1="40" y1="40"  x2="40"  y2="200" stroke="#3a4d6f" stroke-width="1.4"/>

  <!--
    S21 response curve: flat passband then sharp roll-off with three
    notches (transmission zeros) in the stopband. Hand-tuned bezier so
    it reads as an elliptic filter, not a generic curve.
  -->
  <path d="M 40 70
           L 175 70
           C 195 70, 210 75, 218 95
           C 226 115, 232 165, 244 195
           L 250 195
           C 258 170, 262 130, 268 122
           C 274 130, 278 175, 284 192
           L 290 192
           C 296 175, 300 145, 308 138
           C 316 145, 320 175, 326 195
           L 332 195
           C 338 178, 344 158, 360 152
           C 380 148, 410 175, 440 188"
        fill="none" stroke="url(#curve)" stroke-width="3" stroke-linecap="round"
        stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Transmission-zero markers -->
  <g fill="#ff8c5a" stroke="#ff8c5a" stroke-width="1">
    <circle cx="244" cy="195" r="3.2"/>
    <circle cx="284" cy="192" r="3.2"/>
    <circle cx="326" cy="195" r="3.2"/>
  </g>

  <!-- "MCP" tag for the protocol -->
  <g font-family="ui-sans-serif, -apple-system, 'Segoe UI', sans-serif" fill="#9fb3d6">
    <text x="40" y="30" font-size="13" letter-spacing="2" font-weight="600">MCP</text>
    <text x="80" y="30" font-size="13" letter-spacing="0.5" font-weight="400" fill="#5b6f95">·</text>
    <text x="92" y="30" font-size="13" letter-spacing="0.3" font-weight="400" fill="#9fb3d6">RF SUITE</text>
    <!-- Y axis label -->
    <text x="20" y="120" font-size="10" fill="#5b6f95" transform="rotate(-90 20 120)">|S21| dB</text>
    <!-- X axis label -->
    <text x="240" y="220" font-size="10" fill="#5b6f95" text-anchor="middle">frequency</text>
  </g>

  <!-- Wordmark -->
  <text x="240" y="58" font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace"
        font-size="14" font-weight="600" fill="#e8f0ff" text-anchor="middle" letter-spacing="0.5">
    mcp-ltspice-qucs
  </text>
</svg>
