name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.13

      - name: Sync workspace
        run: uv sync --all-packages

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      # No `|| true`. Until v0.4.1 this step was both failing and ignored:
      # mypy aborted on a duplicate-conftest error before checking anything,
      # and the suppression hid it. Both are fixed; keep it enforcing.
      - name: Mypy
        run: uv run mypy packages/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync workspace
        run: uv sync --all-packages

      - name: Install ngspice
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ngspice

      - name: Verify ngspice
        run: ngspice --version

      - name: Run pytest with coverage
        run: uv run pytest -q --cov --cov-report=xml --cov-report=term

  example:
    name: Basic LPF design example
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.13

      - name: Sync workspace
        run: uv sync --all-packages

      - name: Run basic LPF design
        run: uv run python examples/basic_lpf/design.py

      - name: Upload generated artifacts
        uses: actions/upload-artifact@v4
        with:
          name: basic_lpf_outputs
          path: |
            examples/basic_lpf/basic_lpf.s2p
            examples/basic_lpf/basic_lpf.asc
            examples/basic_lpf/response.png
